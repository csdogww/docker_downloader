name: Ultimate Download Docker Image (No Disk Limit)
on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker image name'
        required: true
        default: 'docker://docker.io/etenal/syzscope:ready2go'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Maximize build space (Create massive headroom)
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 30000
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 🔧 Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: 📥 Download and Split on the fly
        run: |
          # 建立工作目录
          mkdir -p ${{ github.workspace }}/output
          cd ${{ github.workspace }}/output
          
          # Skopeo 直接从远端把镜像流式转换为 tar，并且通过管道直接交给 split 切片
          # 全程没有任何中间文件，也没有解压产生的磁盘浪费！
          skopeo copy ${{ github.event.inputs.image }} docker-archive:/dev/stdout | split -b 2000m - image.tar.part.
          
          # 打印一下生成的文件大小，让你安心
          ls -lh

      - name: ⬆️ Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-parts
          # 指定上传切片文件
          path: ${{ github.workspace }}/output/image.tar.part.*
          retention-days: 1
