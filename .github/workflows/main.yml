name: Ultimate Download Docker Image
on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker image name'
        required: true
        default: 'docker://docker.io/etenal/syzscope:ready2go'

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Safely Free up Disk Space
        run: |
          # 仅仅安全地删掉最占空间的几个预装软件，瞬间释放约 20GB
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          df -h

      - name: 🔧 Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: 📥 Download and Split on the fly
        run: |
          mkdir -p ${{ github.workspace }}/output
          cd ${{ github.workspace }}/output
          
          # Skopeo 流式下载并立刻切片（每块 2GB）
          skopeo copy ${{ github.event.inputs.image }} docker-archive:/dev/stdout | split -b 2000m - image.tar.part.
          
          # 检查生成的文件
          ls -lh

      - name: ⬆️ Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-parts
          path: ${{ github.workspace }}/output/image.tar.part.*
          retention-days: 1
