name: Ultimate Download to Release
on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Docker image name'
        required: true
        default: 'docker://docker.io/etenal/syzscope:ready2go'

# 赋予自动创建 Release 的权限
permissions:
  contents: write

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Safely Free up Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean

      - name: 🔧 Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: 📥 Download and Split (1.9GB Chunks)
        run: |
          mkdir -p output
          cd output
          # 切成 1.9GB 的块，确保不超过 GitHub 发布的单文件 2GB 限制
          skopeo copy ${{ github.event.inputs.image }} docker-archive:/dev/stdout | split -b 1900m - image.tar.part.

      - name: 🚀 Upload to Permanent GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 根据时间生成一个版本号
          TAG="v$(date +'%Y%m%d-%H%M%S')"
          # 自动创建发布页，并把所有切片挂载上去
          gh release create "$TAG" ./output/* --repo ${{ github.repository }} --title "Docker Image Download" --notes "永久有效直链。下载所有切片后，在 Windows 执行：cmd /c copy /B image.tar.part.* syzscope.tar"
